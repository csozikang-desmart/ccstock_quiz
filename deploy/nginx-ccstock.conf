# 双创科技赛道 H5 答题小游戏 - Nginx 站点配置片段
# 在已有的 www.raisingstar.cn 站点的 server { ... } 块里 include 此片段

# 路径前缀。前端用相对路径，所有 /ccstock/ 请求统一反代到本机 server.py
location /ccstock/ {
    # 关键：proxy_pass 末尾的 / 会让 Nginx 把 /ccstock 前缀剥掉
    # 例如 浏览器 GET /ccstock/api/quiz  → 后端 GET /api/quiz
    proxy_pass http://127.0.0.1:8000/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket（虽然当前未用，留作扩展）
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 行情抓取首次可能较慢，给充足超时
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # 静态资源可缓存
    location ~* ^/ccstock/.+\.(html|js|css|png|jpg|jpeg|gif|svg|ico)$ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }
}

# 一些人会同时访问 /ccstock（无末尾斜杠），给个 301 重定向到带斜杠
location = /ccstock {
    return 301 /ccstock/;
}
