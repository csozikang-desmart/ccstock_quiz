services:
  - type: web
    name: h5-quiz
    runtime: python
    plan: free
    region: singapore          # 离国内最近，访问延迟最低
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    # Render 会自动注入 PORT 环境变量；server.py 已读取 PORT 并绑定到 0.0.0.0
    autoDeploy: true
